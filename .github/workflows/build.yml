name: Build & Release AXIOM OS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Python (Windows)
        if: matrix.platform == 'win'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools (Windows)
        if: matrix.platform == 'win'
        run: npm install --global windows-build-tools --vs2019
        continue-on-error: true

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Mac
        if: matrix.platform == 'mac'
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Rebuild native modules for Windows
        if: matrix.platform == 'win'
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: "2019"

      - name: Rebuild native modules for Linux
        if: matrix.platform == 'linux'
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Vite
        run: npm run build:vite

      - name: Build Electron
        run: npm run build:electron

      - name: Package Mac
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
