name: Build & Release AXIOM OS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            libnss3 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libgtk-3-0t64 \
            libx11-xcb1

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: "2019"

      - name: Build Vite
        run: npm run build:vite

      - name: Build Electron
        run: npm run build:electron

      - name: Package Mac
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never

      - name: Package Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload Mac
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
